server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─────────────────────────────────────────
    # Proxy: n8n Webhook (avoids CORS)
    # Jarvis sends to /api/webhook/* → n8n.nexotechx.com/webhook/*
    # ─────────────────────────────────────────
    location /api/webhook/ {
        proxy_pass          https://n8n.nexotechx.com/webhook/;
        proxy_http_version  1.1;
        proxy_set_header    Host              n8n.nexotechx.com;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_read_timeout  60s;
    }

    # ─────────────────────────────────────────
    # Proxy: System Stats API → stats container
    # ─────────────────────────────────────────
    location /api/system-stats {
        proxy_pass          http://jarvis-stats:3001/stats;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_read_timeout  10s;
    }

    # ─────────────────────────────────────────
    # Proxy: Spawn CMD (disabled in Docker/Kali)
    # Returns a 200 stub so the app doesn't error
    # ─────────────────────────────────────────
    location /api/spawn-cmd {
        return 200 '{"success":false,"message":"spawn-cmd not available in Docker"}';
        add_header Content-Type application/json;
    }

    # ─────────────────────────────────────────
    # React SPA: serve index.html for all routes
    # ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip for better performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;
}
